version: '3.8'

services:
  gmail-notifier:
    build: .
    container_name: gmail-notifier
    ports:
      - "3000:80"
    environment:
      # === Telegram ===
      - BOT_TOKEN=your_bot_token_here
      
      # === Gmail ===
      - IMAP_SERVER=imap.gmail.com
      - IMAP_PORT=993
      - EMAIL_USER=your_email@gmail.com
      - EMAIL_PASS=your_app_password_here
      
      # === Settings ===
      - CHECK_INTERVAL=60
      - MAX_BODY_LENGTH=300
      - CHAT_ID=your_default_chat_id_here
      
      # === Filter Rules (JSON Array) ===
      # Format: [{"name":"rule name","field":"from|subject","match":"keyword","chat_id":"chat_id"}]
      - FILTER_RULES=[{"name":"All Emails","field":"from","match":"*","chat_id":"your_chat_id_here","priority":99,"enabled":true}]
      
      - TZ=Asia/Bangkok
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
