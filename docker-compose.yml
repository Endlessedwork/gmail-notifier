version: '3.8'

services:
  gmail-notifier:
    build: .
    container_name: gmail-notifier
    ports:
      - "3000:80"
    environment:
      # === Encryption (Required) ===
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

      # === Database ===
      - DATABASE_URL=sqlite:///app/data/data.db

      # === Worker Settings ===
      - CHECK_INTERVAL=60
      - MAX_BODY_LENGTH=300

      # === Timezone ===
      - TZ=Asia/Bangkok

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
