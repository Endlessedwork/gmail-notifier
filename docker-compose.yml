version: '3.8'

services:
  gmail-notifier:
    build: .
    container_name: gmail-telegram-notifier
    restart: unless-stopped
    environment:
      # === Telegram ===
      - BOT_TOKEN=your_bot_token_here
      - CHAT_ID=your_chat_id_here
      
      # === Gmail ===
      - IMAP_SERVER=imap.gmail.com
      - IMAP_PORT=993
      - EMAIL_USER=your_email@gmail.com
      - EMAIL_PASS=your_app_password_here
      
      # === Settings ===
      - CHECK_INTERVAL=60          # ตรวจทุกกี่วินาที (default: 60)
      - MAX_BODY_LENGTH=300        # ความยาว preview (default: 300)
